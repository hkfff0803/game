<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期末周·拯救发际线</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            user-select: none;
        }

        #gameCanvas {
            display: block;
        }

        .library-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://youimg1.c-ctrip.com/target/100m15000000yc5lg2A43.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
            transform: scale(1.05);
            z-index: -3;
        }

        .library-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .library-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(90deg,
                    transparent 0px,
                    transparent 80px,
                    rgba(60, 40, 20, 0.2) 80px,
                    rgba(60, 40, 20, 0.2) 85px
                ),
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(255, 200, 100, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 500px 350px at 80% 25%, rgba(255, 180, 80, 0.06) 0%, transparent 70%);
            z-index: 2;
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.08;
            z-index: 1;
        }

        .noise::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            animation: noiseMove 8s linear infinite;
        }

        @keyframes noiseMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -50%); }
        }

        .dust {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .dust-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 220, 150, 0.6);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            50% { transform: translate(100px, -200px) rotate(180deg); opacity: 0.3; }
            90% { opacity: 0.6; }
        }

        #statusBar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(180deg, rgba(30, 20, 10, 0.95) 0%, rgba(30, 20, 10, 0.8) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
            border-bottom: 2px solid rgba(200, 150, 80, 0.3);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
        }

        .status-item {
            color: #e8c896;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.5);
        }

        #marquee {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            overflow: hidden;
            color: #ffcc80;
            font-size: 16px;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(255, 180, 80, 0.5);
        }

        #marqueeText {
            display: inline-block;
            animation: marqueeScroll 10s linear infinite;
        }

        @keyframes marqueeScroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        #popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #2a1a08 0%, #1a0f04 100%);
            border: 3px solid #d4a056;
            border-radius: 20px;
            padding: 50px 60px;
            text-align: center;
            z-index: 200;
            box-shadow: 0 0 80px rgba(200, 150, 80, 0.4), inset 0 0 50px rgba(0, 0, 0, 0.3);
        }

        #popup h1 {
            color: #ffb74d;
            font-size: 52px;
            margin-bottom: 25px;
            text-shadow: 0 0 30px rgba(255, 180, 80, 0.8);
        }

        #popup p {
            color: #ccc;
            font-size: 18px;
            margin-bottom: 30px;
        }

        #restartBtn {
            background: linear-gradient(145deg, #ff9800, #e65100);
            border: none;
            color: white;
            padding: 18px 50px;
            font-size: 22px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 25px rgba(255, 150, 0, 0.5);
        }

        #restartBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 40px rgba(255, 150, 0, 0.8);
        }

        .flash {
            animation: flash 0.3s ease;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; background: white; }
        }

        .shake {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .drowsy {
            animation: drowsy 0.8s ease;
        }

        @keyframes drowsy {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .borderShake {
            animation: borderShake 0.5s ease;
            box-shadow: inset 0 0 0 5px red;
        }

        @keyframes borderShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }

        .message {
            position: fixed;
            font-size: 70px;
            font-weight: bold;
            pointer-events: none;
            z-index: 150;
            text-shadow: 0 0 25px currentColor, 0 0 50px currentColor;
            animation: messagePop 0.8s ease forwards;
        }

        @keyframes messagePop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        #hairDisplay {
            position: fixed;
            top: 75px;
            right: 25px;
            font-size: 60px;
            z-index: 100;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 10px rgba(255, 200, 100, 0.3));
        }
    </style>
</head>
<body>
    <div class="library-bg"></div>
    <div class="noise"></div>
    <div class="dust" id="dustContainer"></div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="statusBar">
        <div class="status-item">🧠 精神状态：<span id="score">0</span>分</div>
        <div id="marquee">
            <span id="marqueeText">珞珈山爬不动了 ★ 传播学背不完 ★ Python报错退散 ★ 导师看看我 ★ </span>
        </div>
        <div class="status-item">💇‍♂️ 发量：<span id="hair">100</span>%</div>
    </div>
    
    <div id="hairDisplay">👨‍🦱</div>
    
    <div id="popup">
        <h1>已秃，也弱了</h1>
        <p style="margin-bottom: 20px; font-size: 26px; color: #ffb74d;">最终得分：<span id="finalScore">0</span>分</p>
        <p style="font-size: 20px; color: #aaccff; margin-bottom: 30px;">祝大家顺利度过期末周 ✨</p>
        <button id="restartBtn">再卷一次</button>
    </div>

    <script>
        const dustContainer = document.getElementById('dustContainer');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'dust-particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            dustContainer.appendChild(particle);
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const scoreEl = document.getElementById('score');
        const hairEl = document.getElementById('hair');
        const hairDisplay = document.getElementById('hairDisplay');
        const popup = document.getElementById('popup');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        let score = 0;
        let hair = 100;
        let gameRunning = true;
        let baseSpeed = 3;
        let speedMultiplier = 1;
        let items = [];
        let lastSpawnTime = 0;
        let spawnInterval = 1000;

        const brain = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            radius: 60,
            emoji: '🧠'
        };

        const itemTypes = [
            { type: 'book', emoji: '📚', color: '#4CAF50', shape: 'square', points: 10, message: '有效率！', messageColor: '#4CAF50' },
            { type: 'coffee', emoji: '☕', color: '#795548', shape: 'circle', points: 5, message: '续命！', messageColor: '#FFC107', speedBoost: true },
            { type: 'sleep', emoji: '💤', color: '#9E9E9E', shape: 'cloud', points: -15, message: '昏迷！', messageColor: '#2196F3', flash: true },
            { type: 'phone', emoji: '📱', color: '#2196F3', shape: 'square', points: -20, message: '摸鱼被抓！', messageColor: '#F44336', shake: true }
        ];

        function updateBrainPosition(clientX) {
            const minX = brain.radius;
            const maxX = canvas.width - brain.radius;
            brain.x = Math.max(minX, Math.min(maxX, clientX));
        }

        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                updateBrainPosition(e.clientX);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning && e.touches.length > 0) {
                updateBrainPosition(e.touches[0].clientX);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning && e.touches.length > 0) {
                updateBrainPosition(e.touches[0].clientX);
            }
        }, { passive: false });

        function spawnItem() {
            const typeIndex = Math.random() < 0.4 ? 0 : Math.floor(Math.random() * itemTypes.length);
            const type = itemTypes[typeIndex];
            const size = 65;
            
            items.push({
                x: Math.random() * (canvas.width - size * 2) + size,
                y: -size,
                size: size,
                speed: baseSpeed * speedMultiplier,
                ...type
            });
        }

        function showMessage(text, color, x, y) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;
            msg.style.color = color;
            msg.style.left = x + 'px';
            msg.style.top = y + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 800);
        }

        function updateHairDisplay() {
            if (hair > 70) {
                hairDisplay.textContent = '👨‍🦱';
            } else if (hair > 40) {
                hairDisplay.textContent = '👨';
            } else if (hair > 0) {
                hairDisplay.textContent = '👴';
            } else {
                hairDisplay.textContent = '👨‍🦲';
            }
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            popup.style.display = 'block';
        }

        function restartGame() {
            score = 0;
            hair = 100;
            gameRunning = true;
            speedMultiplier = 1;
            items = [];
            scoreEl.textContent = score;
            hairEl.textContent = hair;
            popup.style.display = 'none';
            updateHairDisplay();
        }

        restartBtn.addEventListener('click', restartGame);

        function update(timestamp) {
            if (!gameRunning) return;

            if (timestamp - lastSpawnTime > spawnInterval) {
                spawnItem();
                lastSpawnTime = timestamp;
                spawnInterval = Math.max(500, 1000 - score * 5);
            }

            items.forEach((item, index) => {
                item.y += item.speed;

                const dx = brain.x - item.x;
                const dy = brain.y - item.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < brain.radius + item.size / 2) {
                    score += item.points;
                    if (score < 0) score = 0;
                    scoreEl.textContent = score;

                    if (item.speedBoost) {
                        speedMultiplier *= 1.1;
                    }

                    if (item.flash) {
                        document.body.classList.add('flash');
                        setTimeout(() => document.body.classList.remove('flash'), 300);
                    }

                    if (item.shake) {
                        canvas.classList.add('borderShake');
                        setTimeout(() => canvas.classList.remove('borderShake'), 500);
                    }

                    if (item.type === 'sleep') {
                        canvas.classList.add('drowsy');
                        setTimeout(() => canvas.classList.remove('drowsy'), 800);
                    }

                    showMessage(item.message, item.messageColor, item.x, item.y);
                    items.splice(index, 1);
                }

                if (item.y > canvas.height) {
                    if (item.type === 'book') {
                        hair -= 10;
                        hairEl.textContent = hair;
                        updateHairDisplay();
                        
                        if (hair <= 0) {
                            hair = 0;
                            hairEl.textContent = hair;
                            updateHairDisplay();
                            gameOver();
                        }
                    }
                    items.splice(index, 1);
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.font = `${brain.radius * 2}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(brain.emoji, brain.x, brain.y);

            items.forEach(item => {
                ctx.font = `${item.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.emoji, item.x, item.y);
            });
        }

        function gameLoop(timestamp) {
            update(timestamp);
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            brain.y = canvas.height - 100;
        });

        gameLoop(0);
    </script>
</body>
</html>
